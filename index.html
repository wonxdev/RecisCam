<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk RecisCam</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <div class="card">
      <h1>Masuk RecisCam</h1>
      <p>Silakan masuk untuk melanjutkan.</p>

      <label>Email Sekolah</label>
      <input id="email" type="email" placeholder="nama@email.com" />

      <label>Kata Sandi</label>
      <input id="password" type="password" placeholder="••••••••" />

      <button id="loginBtn">Masuk</button>

      <div style="text-align:center;">
        <a href="register.html" class="text-link">Belum punya akun? Daftar</a>
      </div>
    </div>
  </main>

  <footer>RecisCam — Sistem Piket Sekolah</footer>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      /* ================= CONFIG ================= */
      const SUPABASE_URL = "https://whcisuqiafcsxebeuokz.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoY2lzdXFpYWZjc3hlYmV1b2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MjUwNjYsImV4cCI6MjA4NTAwMTA2Nn0.F1pm8a9UID1P5Yjbu8NmpH_AJEmsP85O5BJc83UnloQ";

      const supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );

      const btn = document.getElementById("loginBtn");

      /* ================= AUTO REDIRECT ================= */
      (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return;

        const { data: profile } = await supabase
          .from("profiles")
          .select("role")
          .eq("id", user.id)
          .maybeSingle();

        if (!profile) return;

        window.location.href =
          profile.role === "student"
            ? "student.html"
            : "teacher.html";
      })();

      /* ================= LOGIN ================= */
      btn.addEventListener("click", async () => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          alert("Email dan kata sandi wajib diisi.");
          return;
        }

        btn.disabled = true;
        btn.innerText = "Masuk...";

        try {
          const { data, error } =
            await supabase.auth.signInWithPassword({
              email,
              password
            });

          if (error) throw error;

          const { data: profile } = await supabase
            .from("profiles")
            .select("role")
            .eq("id", data.user.id)
            .maybeSingle();

          if (!profile) {
            throw new Error("Role akun tidak ditemukan.");
          }

          window.location.href =
            profile.role === "student"
              ? "student.html"
              : "teacher.html";

        } catch (err) {
          alert(err.message);
          btn.disabled = false;
          btn.innerText = "Masuk";
        }
      });

    });
  </script>
</body>

</html>
