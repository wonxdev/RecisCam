<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0e14" />
  <title>Dasbor Guru — RecisCam</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div id="toast-container" class="toast-container"></div>

  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="teacher.html">
        <img class="brand-mark" src="../assets/icons/icon.svg" alt="" />
        <span class="brand-name">RecisCam</span>
      </a>
      <button id="logoutBtn" class="btn btn-ghost btn-sm" type="button">Keluar</button>
    </div>
  </header>

  <main class="container page-content">
    <section class="card">
      <p class="eyebrow">Dasbor Guru</p>
      <h1 class="hero-title">Laporan Piket</h1>
      <p class="hero-sub">Verifikasi laporan piket harian (data contoh).</p>

      <div class="toolbar">
        <select id="dayFilter" aria-label="Filter hari piket">
          <option value="all">Semua Hari</option>
          <option value="Senin">Senin</option>
          <option value="Selasa">Selasa</option>
          <option value="Rabu">Rabu</option>
          <option value="Kamis">Kamis</option>
          <option value="Jumat">Jumat</option>
        </select>
        <button class="btn btn-secondary" id="exportBtn" type="button">Ekspor Excel</button>
      </div>
    </section>

    <section id="list" class="list">
      <div class="empty-state">Memuat data…</div>
    </section>
  </main>

  <footer class="page-footer">RecisCam — Sistem Piket Sekolah (Portfolio Demo)</footer>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="../demo/demo-data.js"></script>
  <script src="../assets/js/demo-store.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/teacher.js"></script>
</body>

</html>
