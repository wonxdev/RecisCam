<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar RecisCam</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Daftar Akun</h1>
      <p>Buat akun demo baru untuk siswa. Data hanya disimpan di browser ini.</p>

      <label>Email</label>
      <input id="email" type="email" placeholder="nama@email.com">

      <label>Kata Sandi</label>
      <input id="password" type="password" placeholder="••••••••">

      <label>Kelas</label>
      <select id="kelas">
        <option value="" disabled selected>Pilih Kelas</option>
        <option>XII A</option>
        <option>XII B</option>
        <option>XII C</option>
        <option>XII D</option>
        <option>XII E</option>
        <option>XII F</option>
        <option>XII G</option>
        <option>XII H</option>
        <option>XII I</option>
        <option>XII J</option>
      </select>

      <label>Hari Piket</label>
      <select id="piketDay">
        <option value="" disabled selected>Pilih Hari</option>
        <option>Senin</option>
        <option>Selasa</option>
        <option>Rabu</option>
        <option>Kamis</option>
        <option>Jumat</option>
      </select>

      <button id="registerBtn">Daftar Sekarang</button>

      <div style="text-align:center;">
        <a href="../index.html" class="text-link">Sudah punya akun? Masuk</a>
      </div>
    </div>

    <footer>RecisCam — Sistem Piket Sekolah (Portfolio Demo)</footer>
  </div>

  <script src="../demo/demo-data.js"></script>
  <script src="../assets/js/demo-store.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/register.js"></script>
</body>

</html>
