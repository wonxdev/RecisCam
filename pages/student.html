<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0e14" />
  <title>Dasbor Siswa — RecisCam</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="icon" href="../assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div id="toast-container" class="toast-container"></div>

  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="student.html">
        <img class="brand-mark" src="../assets/icons/icon.svg" alt="" />
        <span class="brand-name">RecisCam</span>
      </a>
      <button id="logoutBtn" class="btn btn-ghost btn-sm" type="button">Keluar</button>
    </div>
  </header>

  <main class="container page-content">
    <section class="card">
      <p class="eyebrow">Dasbor Siswa</p>
      <h1 class="hero-title">Halo, <span id="userName">Siswa</span></h1>
      <p class="hero-sub" id="userClass">…</p>

      <div class="stat-grid">
        <div class="stat">
          <span class="stat-label">Jadwal Piket</span>
          <span class="stat-value" id="piketDay">…</span>
        </div>
        <div class="stat">
          <span class="stat-label">Peringatan</span>
          <span class="stat-value" id="warningCount">0/3</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">Upload Bukti Piket</h2>
      <p class="card-desc">Pastikan foto terlihat jelas. Batas upload pukul 15.00 WIB.</p>

      <div class="file-input-wrapper">
        <button class="upload-drop" type="button">
          <span class="upload-icon" aria-hidden="true">📷</span>
          <span>Ambil Foto / Pilih File</span>
        </button>
        <input type="file" id="photo" accept="image/*" capture="environment" aria-label="Pilih foto bukti piket">
      </div>

      <div id="preview" class="upload-preview" hidden>
        <span class="upload-filename" id="filename"></span>
        <img id="previewImg" alt="Pratinjau bukti piket" hidden>
      </div>

      <button id="submitBtn" class="btn btn-primary btn-block mt-5" type="button">Kirim Bukti</button>
    </section>

    <section>
      <h2 class="section-title">Riwayat &amp; Jadwal</h2>
      <div id="scheduleList" class="list">
        <div class="empty-state">Memuat jadwal…</div>
      </div>
    </section>
  </main>

  <footer class="page-footer">RecisCam — Sistem Piket Sekolah (Portfolio Demo)</footer>

  <script src="../demo/demo-data.js"></script>
  <script src="../assets/js/demo-store.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/student.js"></script>
</body>

</html>
