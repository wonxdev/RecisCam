</head>

<!-- 2️⃣ INITIALIZE SUPABASE -->

<body>
  <!-- Notification Container -->
  <div id="toast-container" class="notification-container"></div>

  <div class="container">
    <div class="card" style="margin-bottom:12px;">
      <h2 style="margin-bottom:4px;">Dashboard Guru</h2>
      <p style="margin-bottom:16px;">Verifikasi laporan piket harian.</p>

      <div style="display:flex; gap:12px;">
        <select id="dayFilter" onchange="load()" style="margin-bottom:0; flex:2;">
          <option value="all">Semua Hari</option>
          <option value="Senin">Senin</option>
          <option value="Selasa">Selasa</option>
          <option value="Rabu">Rabu</option>
          <option value="Kamis">Kamis</option>
          <option value="Jumat">Jumat</option>
        </select>
        <button class="secondary" onclick="exportExcel()" style="margin-top:0; flex:1; padding:10px;">
          ⬇ Excel
        </button>
      </div>
    </div>

    <div id="list">
      <div style="text-align:center; color:var(--text-muted); margin-top:40px;">Memuat data...</div>
    </div>

    <button class="secondary" onclick="logout()" style="margin-top:auto;">Keluar Akun</button>

    <footer>RecisCam — Sistem Piket Sekolah</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script>
    let cachedData = [];

    async function requireTeacher() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.replace("index.html");
        throw new Error("No session");
      }

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", session.user.id)
        .single();

      if (error || !profile || profile.role !== "teacher") {
        await supabase.auth.signOut();
        window.location.replace("index.html");
        throw new Error("Not teacher");
      }

      return session.user;
    }

    async function load() {
      const listEl = document.getElementById('list');
      if (!listEl) return;

      try {
        const dayFilter = document.getElementById('dayFilter').value || 'all';

        // Step 1: Fetch Attendance
        const { data: attendanceData, error: attError } = await supabase
          .from('attendance')
          .select('*')
          .order('created_at', { ascending: false });

        if (attError) throw attError;

        // 🔧 DEBUG LOGS
        console.log("DEBUG: Raw attendance query result:", attendanceData);
        console.log("DEBUG: Length of attendance array:", attendanceData ? attendanceData.length : 0);

        if (!attendanceData || attendanceData.length === 0) {
          listEl.innerHTML = `<div style="text-align:center; margin-top:40px;">Belum ada laporan masuk.</div>`;
          cachedData = [];
          return;
        }

        // Step 2: Extract IDs and Fetch Profiles
        const userIds = [...new Set(attendanceData.map(a => a.user_id).filter(id => id))];
        let profiles = [];
        if (userIds.length > 0) {
          const { data, error: profError } = await supabase.from('profiles').select('*').in('id', userIds);
          if (profError) console.error("Profiles error:", profError);
          else profiles = data || [];
        }

        const profileMap = {};
        profiles.forEach(p => profileMap[p.id] = p);

        // Step 3: Merge Logic
        let merged = attendanceData.map(a => ({
          ...a,
          profile: profileMap[a.user_id] || {}
        }));

        console.log("DEBUG: Result after profile merge:", merged);

        // Step 4: Filtering Logic
        let filtered = merged;
        if (dayFilter !== 'all') {
          filtered = merged.filter(item => item.profile && item.profile.piket_day === dayFilter);
        }

        console.log("DEBUG: Result after filtering (" + dayFilter + "):", filtered);

        cachedData = filtered;
        render(filtered);
      } catch (err) {
        console.error('LOAD BUG:', err);
        listEl.innerHTML = `<div style="text-align:center; color:red; margin-top:40px;">Gagal memuat: ${err.message}</div>`;
      }
    }

    function render(data) {
      const listEl = document.getElementById('list');
      if (!listEl) return;

      if (!data || data.length === 0) {
        listEl.innerHTML = `<div style="text-align:center; margin-top:40px;">Tidak ada data laporan piket.</div>`;
        return;
      }

      const html = data.map(a => {
        const date = new Date(a.created_at);
        const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const dateStr = date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });

        // Robust Status Logic
        let badgeClass = 'pending';
        let badgeText = a.status || 'Menunggu';
        const s = (a.status || '').toLowerCase();

        if (s === 'present' || s === 'approved' || s === 'hadir') {
          badgeClass = 'approved';
          badgeText = 'Hadir';
        } else if (s === 'absent' || s === 'rejected' || s === 'ditolak') {
          badgeClass = 'rejected';
          badgeText = 'Ditolak';
        } else if (s === 'late' || s === 'terlambat') {
          badgeClass = 'pending';
          badgeText = 'Terlambat';
        } else if (s === 'overdue' || s === 'terlewat' || s === 'missed') {
          badgeClass = 'rejected';
          badgeText = 'Terlewat';
        }

        const name = a.profile.full_name || 'Siswa';
        const className = a.profile.class || 'Kelas Tidak Ada';
        const piket = a.profile.piket_day || '-';

        return `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
                    <div>
                        <div style="font-weight:700; font-size:1.1rem;">${name} (${className})</div>
                        <small style="color:var(--text-muted);">${piket} • ${dateStr} ${timeStr}</small>
                    </div>
                    <span class="badge ${badgeClass}">${badgeText}</span>
                </div>

                <div style="margin-bottom:12px; background:#f8fafc; padding:8px; border-radius:8px;">
                     <small style="display:block; color:var(--text-muted);">Bukti Dukung:</small>
                     <a href="${a.photo_url || '#'}" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:500;">
                        ${a.photo_url ? 'Lihat Foto' : 'Tidak Ada'}
                     </a>
                </div>

                <div style="margin-bottom:12px;">
                    <label style="margin-top:0;">Catatan Guru</label>
                    <input type="text" id="note_${a.id}" value="${a.note || ''}" placeholder="Feedback...">
                </div>

                <div class="actions">
                     <button class="success" onclick="updateStatus('${a.id}', 'present')">Terima</button>
                     <button class="danger" onclick="updateStatus('${a.id}', 'absent')">Tolak</button>
                </div>
            </div>`;
      }).join('');

      listEl.innerHTML = html;
    }

    async function updateStatus(id, status) {
      const btn = event.target;
      const originalText = btn.innerText;

      try {
        const noteInput = document.getElementById(`note_${id}`);
        const note = noteInput ? noteInput.value : '';

        btn.innerText = '...';
        btn.disabled = true;

        const { error } = await supabase
          .from('attendance')
          .update(
            { status: status, note: note },
            { returning: 'minimal' }   // ✅ THIS IS THE KEY
          )
          .eq('id', id);

        if (error) throw error;

        const item = cachedData.find(i => i.id == id);
        if (item?.user_id) {
          await supabase.from('notifications').insert({
            user_id: item.user_id,
            message: status === 'present'
              ? 'Laporan piket disetujui'
              : `Laporan piket ditolak${note ? ': ' + note : ''}`
          });
        }

        await load();

      } catch (err) {
        console.error(err);
        alert('Gagal update: ' + err.message);
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    async function logout() {
      await supabase.auth.signOut();
      localStorage.clear();
      sessionStorage.clear();
      window.location.replace('index.html');
    }

    function exportExcel() {
      if (!cachedData.length) return alert("Kosong!");
      const ws = XLSX.utils.json_to_sheet(cachedData.map(r => ({
        Nama: r.profile.full_name || 'Siswa',
        Kelas: r.profile.class || '-',
        Status: r.status,
        Tanggal: r.created_at
      })));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Laporan");
      XLSX.writeFile(wb, "RecisCam.xlsx");
    }

    (async function init() {
      await requireTeacher();
      await load();
    })();
  </script>
</body>

</html>
